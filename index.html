<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmolab Interactive Poster</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/mobile/layout.css">
</head>

<body>
    <section class="section-1">

        <div class="subsection-1-1">

            <!-- 0 тайтл космолаб (десктоп) -->
            <div id="kosmolab-logo" class="logo-container"></div>

            <!-- 0 тайтл космолаб (мобилка) -->
            <div id="kosmolab-logo" class="logo-container">
                <img src="images/0.4-kosmolab.svg" class="logo-mobile-img" alt="0.4-kosmolab">
            </div>

            <!-- 1 обводка кружочки -->
            <div class="workspace-wrapper">
                <div id="circle-guide" class="circle-layer"></div>
                
                <div class="planet-layer">
                    <img src="images/2.1-planet-orbital.png" id="planet-orbital" class="planet-img active">
                    <img src="images/2.2-planet-relief.png" id="planet-relief" class="planet-img">
                    <img src="images/2.3-planet-selenic.png" id="planet-selenic" class="planet-img">
                </div>
            </div>

            <!-- левый сайдбар -->
            <div class="sidebar-left">

                <!-- 2 соо -->
                <div class="message-box variant-black">
                    <div class="message-content">
                        <p class="message-text">СЛЕДУЙТЕ ИНСТРУКЦИЯМ В&nbsp;БОКСАХ ДЛЯ&nbsp;СБОРКИ ЖЕЛАЕМОЙ ПЛАНЕТЫ</p>
                        <div class="divider"></div>
                        <div class="message-footer">
                            <span class="label">P2</span>
                            <span class="number">0</span>
                        </div>
                    </div>
                </div>

                <div class="message-box variant-white">
                    <div class="message-content">
                        <p class="message-text">ВЫБЕРИТЕ ВИД ВАШЕЙ ПЛАНЕТЫ</p>
                        <div class="divider"></div>
                        <div class="message-footer">
                            <span class="label">P2</span>
                            <span class="number">1</span>
                        </div>
                    </div>
                </div>

                <!-- 3 перегородка -->
                <div class="sidebar-divider"></div>

                <!-- 4 кнопочки -->
                <div class="planet-switcher">
                    <button class="planet-btn active" data-planet="orbital">ОРБИТАЛЬНАЯ</button>
                    <button class="planet-btn" data-planet="relief">РЕЛЬЕФНАЯ</button>
                    <button class="planet-btn" data-planet="selenic">СЕЛЕНИЧЕСКАЯ</button>
                </div>

            </div>

            <!-- правый сайдбар -->
            <div class="sidebar-right">

                <!-- 6 навигация -->
                <div class="nav-box">
                    <div class="nav-content">
                        <p class="nav-item title-black">СБОРКА ПЛАНЕТЫ</p>
                        
                        <div class="nav-divider"></div>
                        
                        <p class="nav-item active-white">СТРУКТУРА</p>
                        <p class="nav-item inactive-blue">ЦВЕТ</p>
                        <p class="nav-item inactive-blue">НАБОР</p>
                        
                        <div class="nav-divider"></div>
                        
                        <div class="nav-planet-preview">
                            <img src="images/2.1-planet-orbital.png" id="nav-img-orbital" class="nav-preview-img active">
                            <img src="images/2.2-planet-relief.png" id="nav-img-relief" class="nav-preview-img">
                            <img src="images/2.3-planet-selenic.png" id="nav-img-selenic" class="nav-preview-img">
                        </div>

                    </div>
                </div>

                <!-- граф -->
                <div class="graph-container">
                    <video autoplay loop muted playsinline class="graph-video">
                        <source src="videos/4-graph-animation.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            
        </div>

    </section>

    <script src="js/script.js"></script>
</body>
</html>
