<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmolab Interactive Poster</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/syles.css">
</head>

<body>
    <section class="section-1">

        <div class="subsection-1-1">

            <!-- тайтл космолаб -->
            <div id="kosmolab-logo" class="logo-container"></div>

            <!-- обводка кружочки -->
            <div class="workspace-wrapper">
                <div id="circle-guide" class="circle-layer"></div>
                
            </div>

            <!-- 2 соо слева -->
            <div class="sidebar-left">
                
                <div class="message-box variant-black">
                    <div class="message-content">
                        <p class="message-text">СЛЕДУЙТЕ ИНСТРУКЦИЯМ В&nbsp;БОКСАХ ДЛЯ&nbsp;СБОРКИ ЖЕЛАЕМОЙ ПЛАНЕТЫ</p>
                        <div class="divider"></div>
                        <div class="message-footer">
                            <span class="label">P2</span>
                            <span class="number">0</span>
                        </div>
                    </div>
                </div>

                <div class="message-box variant-white">
                    <div class="message-content">
                        <p class="message-text">ВЫБЕРИТЕ ВИД ВАШЕЙ ПЛАНЕТЫ</p>
                        <div class="divider"></div>
                        <div class="message-footer">
                            <span class="label">P2</span>
                            <span class="number">1</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-divider"></div>

                <div class="planet-switcher">
                    <button class="planet-btn active" data-planet="orbital">ОРБИТАЛЬНАЯ</button>
                    <button class="planet-btn" data-planet="relief">РЕЛЬЕФНАЯ</button>
                    <button class="planet-btn" data-planet="selenic">СЕЛЕНИЧЕСКАЯ</button>
                </div>

            </div>
            
        </div>

    </section>

    <script src="js/script.js"></script>
</body>
</html>
